<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Agricog Assist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .form-label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .btn-primary {
            background-color: #10b981;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #059669;
        }
        .btn-primary:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-green-100">
    <div class="container mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-green-800 mb-4">
                Welcome Back
            </h1>
            <p class="text-lg text-green-700 max-w-2xl mx-auto">
                Sign in to your Agricog Assist account to access your personalized 
                agricultural intelligence dashboard.
            </p>
        </div>

        <!-- Login Form -->
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-xl overflow-hidden">
            <div class="p-8">
                <div class="text-center mb-6">
                    <div class="text-3xl mb-2">🌾</div>
                    <h2 class="text-xl font-semibold text-green-800">Sign In to Your Account</h2>
                </div>
                
                <form id="login-form">
                    <div class="mb-6">
                        <label class="form-label" for="username">Username or Email</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input" 
                            required
                            data-testid="input-username"
                        >
                    </div>

                    <div class="mb-6">
                        <label class="form-label" for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            required
                            data-testid="input-password"
                        >
                    </div>

                    <button 
                        type="submit" 
                        class="btn-primary w-full"
                        data-testid="button-sign-in"
                    >
                        Sign In
                    </button>
                </form>

                <!-- Loading State -->
                <div id="loading" style="display: none;" class="text-center py-8">
                    <div class="inline-block w-6 h-6 border-4 border-green-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-green-700 mt-2">Signing you in...</p>
                </div>

                <!-- Success Message -->
                <div id="success" style="display: none;" class="text-center py-8">
                    <div class="text-4xl mb-4">✅</div>
                    <h3 class="text-xl font-semibold text-green-800 mb-2">Welcome back!</h3>
                    <p class="text-green-700 mb-4">Redirecting you to your dashboard...</p>
                </div>

                <!-- Error Message -->
                <div id="error" style="display: none;" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mt-4">
                    <p id="error-message"></p>
                </div>
            </div>
        </div>

        <!-- Create Account Link -->
        <div class="text-center mt-6">
            <p class="text-green-700">
                Don't have an account? 
                <a href="/signup" class="text-green-600 hover:underline font-semibold" data-testid="link-create-account">Create one here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            showLoading();
            
            try {
                const response = await fetch('/api/login-traditional', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: data.username,
                        password: data.password
                    })
                });
                
                if (response.ok) {
                    showSuccess();
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    const error = await response.text();
                    showError(error || 'Invalid credentials');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        });
        
        function showLoading() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }
        
        function showSuccess() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }
        
        function showError(message) {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }
    </script>
</body>
</html>
