<!DOCTYPE html>
<html>
<head>
    <title>Test Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Simple Test Form</h1>
    
    <form id="test-form" class="space-y-4">
        <div>
            <label class="block">First Name:</label>
            <input type="text" name="firstName" value="Test" class="border p-2">
        </div>
        <div>
            <label class="block">Last Name:</label>
            <input type="text" name="lastName" value="User" class="border p-2">
        </div>
        <div>
            <label class="block">Email:</label>
            <input type="email" name="email" value="test@example.com" class="border p-2">
        </div>
        <div>
            <label class="block">Username:</label>
            <input type="text" name="username" value="testuser" class="border p-2">
        </div>
        <div>
            <label class="block">Password:</label>
            <input type="password" name="password" value="test123" class="border p-2">
        </div>
        
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Test Submit</button>
    </form>
    
    <div id="result" class="mt-4 p-4 border"></div>
    
    <script>
        document.getElementById('test-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const user = await response.json();
                    result.innerHTML = `<div class="text-green-600">SUCCESS: User created with ID ${user.id}</div>`;
                } else {
                    const error = await response.text();
                    result.innerHTML = `<div class="text-red-600">ERROR: ${error}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="text-red-600">NETWORK ERROR: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
